<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover'>
  <meta name='mobile-web-app-capable' content='yes'>
  <meta name='apple-mobile-web-app-capable' content='yes'>
  <link rel='icon' type='image/png' sizes='3232' href='favicon-32x32.png'>
  <link rel='icon' type='image/png' sizes='96x96' href='favicon-96x96.png'>
  <link rel='stylesheet' href='css/common.css'>
  <title>Seguimiento a escala de la habitacion (Magic Window)</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <header style="position: absolute; z-index: 10; background: rgba(0,0,0,0.6); color: #fff; padding: 10px; width: 100%;">
    <details open>
      <summary>Escala de habitacion</summary>
      <p>
        Haz clic abajo para activar los sensores físicos de rotación y explorar el entorno en 360 grados.
        <a class="back" href="./" style="color: #00bcd4;">Back</a>
      </p>
    </details>
  </header>

  <script type="module">
    import { WebXRButton } from './js/util/webxr-button.js';
    import { Scene } from './js/render/scenes/scene.js';
    import { Renderer, createWebGLContext } from './js/render/core/renderer.js';
    import { Gltf2Node } from './js/render/nodes/gltf2.js';
    import { SkyboxNode } from './js/render/nodes/skybox.js';
    import { QueryArgs } from './js/util/query-args.js';

    import WebXRPolyfill from './js/third-party/webxr-polyfill/build/webxr-polyfill.module.js';
    if (QueryArgs.getBool('usePolyfill', true)) {
      let polyfill = new WebXRPolyfill();
    }

    let xrButton = null;
    let xrSession = null;
    let xrRefSpace = null;

    let gl = null;
    let renderer = null;
    let scene = new Scene();

    // Guardaremos los ángulos de rotación del teléfono en radianes
    let currentAlpha = 0;
    let currentBeta = 0;
    let currentGamma = 0;

    scene.addNode(new Gltf2Node({url: 'media/gltf/camp/camp.gltf'}));
    scene.addNode(new SkyboxNode({url: 'media/textures/eilenriede-park-2k.png'}));
    scene.standingStats(true);

    function initXR() {
      xrButton = new WebXRButton({
        onRequestSession: onRequestSession,
        onEndSession: onEndSession,
        textEnterXR: "ACTIVAR GIRÓSCOPO",
        textXRNotFound: "XR NO SOPORTADO",
        textLeaveXR: "SALIR"
      });
      document.querySelector('header').appendChild(xrButton.domElement);

      if (navigator.xr) {
        navigator.xr.isSessionSupported('inline').then((supported) => {
          xrButton.enabled = supported;
        });
      }
    }

    function onRequestSession() {
      // Solicitar permisos de sensores nativos para iOS y Android
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation);
            }
          })
          .catch(console.error);
      } else {
        window.addEventListener('deviceorientation', handleOrientation);
      }

      return navigator.xr.requestSession('inline').then(onSessionStarted);
    }

    function handleOrientation(event) {
      // Convertimos directamente a radianes para los cálculos gráficos
      currentAlpha = event.alpha ? event.alpha * (Math.PI / 180) : 0;
      currentBeta = event.beta ? event.beta * (Math.PI / 180) : 0;
      currentGamma = event.gamma ? event.gamma * (Math.PI / 180) : 0;
    }

    function onSessionStarted(session) {
      xrSession = session;
      xrButton.setSession(session);
      session.addEventListener('end', onSessionEnded);

      initGL();

      let glLayer = new XRWebGLLayer(session, gl);
      session.updateRenderState({ baseLayer: glLayer });

      session.requestReferenceSpace('viewer').then((refSpace) => {
        xrRefSpace = refSpace;
        session.requestAnimationFrame(onXRFrame);
      });
    }

    function initGL() {
      if (gl) return;
      gl = createWebGLContext({ xrCompatible: true });
      document.body.appendChild(gl.canvas);

      onResize();
      window.addEventListener('resize', onResize);

      renderer = new Renderer(gl);
      scene.setRenderer(renderer);
    }

    function onResize() {
      if (!gl) return;
      gl.canvas.width = gl.canvas.clientWidth * window.devicePixelRatio;
      gl.canvas.height = gl.canvas.clientHeight * window.devicePixelRatio;
    }

    function onEndSession(session) {
      window.removeEventListener('deviceorientation', handleOrientation);
      session.end();
    }

    function onSessionEnded(event) {
      xrButton.setSession(null);
      xrSession = null;
    }

    function onXRFrame(t, frame) {
      let session = frame.session;
      let pose = frame.getViewerPose(xrRefSpace);

      scene.startFrame();
      session.requestAnimationFrame(onXRFrame);

      if (pose) {
        for (let view of pose.views) {
          // Preparamos funciones trigonométricas limpias
          let cA = Math.cos(currentAlpha), sA = Math.sin(currentAlpha);
          let cB = Math.cos(currentBeta),  sB = Math.sin(currentBeta);
          let cG = Math.cos(currentGamma), sG = Math.sin(currentGamma);

          // Construimos una matriz 4x4 válida en formato Float32Array (Columna por columna)
          // Esto evita romper la estructura interna del motor gráfico
          let outMat = new Float32Array(16);

          // Columna 1
          outMat[0] = cA * cG - sA * sB * sG;
          outMat[1] = sA * cG + cA * sB * sG;
          outMat[2] = -cB * sG;
          outMat[3] = 0;

          // Columna 2
          outMat[4] = -sA * cB;
          outMat[5] = cA * cB;
          outMat[6] = sB;
          outMat[7] = 0;

          // Columna 3
          outMat[8] = cA * sG + sA * sB * cG;
          outMat[9] = sA * sG - cA * sB * cG;
          outMat[10] = cB * cG;
          outMat[11] = 0;

          // Columna 4 (Posición de la cámara: X=0, Y=1.6 metros de altura, Z=0)
          outMat[12] = 0;
          outMat[13] = 1.6;
          outMat[14] = 0;
          outMat[15] = 1;

          // Asignamos la matriz corregida a la transformación de la vista
          view.transform.matrix.set(outMat);
        }

        scene.drawXRFrame(frame, pose);
      }

      scene.endFrame();
    }

    initXR();
  </script>
</body>
</html>
