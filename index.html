<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover'>
  <meta name='mobile-web-app-capable' content='yes'>
  <meta name='apple-mobile-web-app-capable' content='yes'>
  <link rel='icon' type='image/png' sizes='3232' href='favicon-32x32.png'>
  <link rel='icon' type='image/png' sizes='96x96' href='favicon-96x96.png'>
  <link rel='stylesheet' href='css/common.css'>
  <title>Seguimiento a escala de la habitacion (Magic Window Giroscopio)</title>
</head>
<body>
  <header>
    <details open>
      <summary>Escala de habitacion</summary>
      <p>
        Haz clic abajo para iniciar. Gira tu cuerpo físicamente con el teléfono en la mano para explorar el entorno 3D en 360 grados usando tus sensores.
        <a class="back" href="./">Back</a>
      </p>
    </details>
  </header>

  <script type="module">
    import { WebXRButton } from './js/util/webxr-button.js';
    import { Scene } from './js/render/scenes/scene.js';
    import { Renderer, createWebGLContext } from './js/render/core/renderer.js';
    import { Gltf2Node } from './js/render/nodes/gltf2.js';
    import { SkyboxNode } from './js/render/nodes/skybox.js';
    import { QueryArgs } from './js/util/query-args.js';

    import WebXRPolyfill from './js/third-party/webxr-polyfill/build/webxr-polyfill.module.js';
    if (QueryArgs.getBool('usePolyfill', true)) {
      let polyfill = new WebXRPolyfill();
    }

    let xrButton = null;
    let xrSession = null;
    let xrRefSpace = null;

    let gl = null;
    let renderer = null;
    let scene = new Scene();

    // Variables de orientación nativas del giroscopio del teléfono
    let deviceAlpha = 0;
    let deviceBeta = 0;
    let deviceGamma = 0;

    // Cargamos los elementos dentro de la escena raíz del framework
    scene.addNode(new Gltf2Node({url: 'media/gltf/camp/camp.gltf'}));
    scene.addNode(new SkyboxNode({url: 'media/textures/eilenriede-park-2k.png'}));
    scene.standingStats(true);

    function initXR() {
      xrButton = new WebXRButton({
        onRequestSession: onRequestSession,
        onEndSession: onEndSession,
        textEnterXR: "INICIAR SENSORES",
        textXRNotFound: "XR NO SOPORTADO",
        textLeaveXR: "SALIR"
      });
      document.querySelector('header').appendChild(xrButton.domElement);

      if (navigator.xr) {
        navigator.xr.isSessionSupported('inline').then((supported) => {
          xrButton.enabled = supported;
        });
      }
    }

    function onRequestSession() {
      // CAPTURA DIRECTA DEL SENSOR: Escuchamos el giroscopio de Android/Samsung de forma paralela a WebXR
      window.addEventListener('deviceorientation', handleOrientation, true);
      return navigator.xr.requestSession('inline').then(onSessionStarted);
    }

    function handleOrientation(event) {
      // Almacenamos las rotaciones físicas reales del teléfono en grados
      deviceAlpha = event.alpha ? event.alpha : 0; // Rotación sobre eje Z (Giro izquierda/derecha)
      deviceBeta = event.beta ? event.beta : 0;   // Rotación sobre eje X (Inclinación adelante/atrás)
      deviceGamma = event.gamma ? event.gamma : 0; // Rotación sobre eje Y (Inclinación lateral)
    }

    function onSessionStarted(session) {
      xrSession = session;
      xrButton.setSession(session);
      session.addEventListener('end', onSessionEnded);

      initGL();

      let glLayer = new XRWebGLLayer(session, gl);
      session.updateRenderState({ baseLayer: glLayer });

      // Solicitamos el espacio de referencia base viewer requerido para sesiones inline
      session.requestReferenceSpace('viewer').then((refSpace) => {
        xrRefSpace = refSpace;
        session.requestAnimationFrame(onXRFrame);
      });
    }

    function initGL() {
      if (gl) return;
      gl = createWebGLContext({ xrCompatible: true });
      document.body.appendChild(gl.canvas);

      onResize();
      window.addEventListener('resize', onResize);

      renderer = new Renderer(gl);
      scene.setRenderer(renderer);
    }

    function onResize() {
      if (!gl) return;
      gl.canvas.width = gl.canvas.clientWidth * window.devicePixelRatio;
      gl.canvas.height = gl.canvas.clientHeight * window.devicePixelRatio;
    }

    function onEndSession(session) {
      window.removeEventListener('deviceorientation', handleOrientation, true);
      session.end();
    }

    function onSessionEnded(event) {
      xrButton.setSession(null);
      xrSession = null;
    }

    function onXRFrame(t, frame) {
      let session = frame.session;
      let pose = frame.getViewerPose(xrRefSpace);

      scene.startFrame();
      session.requestAnimationFrame(onXRFrame);

      if (pose) {
        // TRADUCCIÓN MATRICIAL FLUIDA: Convertimos los ángulos del giroscopio a radianes
        let radAlpha = deviceAlpha * (Math.PI / 180);
        let radBeta = deviceBeta * (Math.PI / 180);
        let radGamma = deviceGamma * (Math.PI / 180);

        let c1 = Math.cos(radAlpha / 2);
        let s1 = Math.sin(radAlpha / 2);
        let c2 = Math.cos(radBeta / 2);
        let s2 = Math.sin(radBeta / 2);
        let c3 = Math.cos(radGamma / 2);
        let s3 = Math.sin(radGamma / 2);

        // Componentes matemáticos del cuaternión de rotación del teléfono
        let qx = s2 * c1 * c3 - c2 * s1 * s3;
        let qy = c2 * s1 * c3 + s2 * c1 * s3;
        let qz = c2 * c1 * s3 - s2 * s1 * c3;
        let qw = c2 * c1 * c3 + s2 * c1 * s3;

        for (let view of pose.views) {
          let m = view.transform.matrix;

          // Inyectamos la rotación exacta calculada directamente en la matriz 4x4 de la vista WebGL.
          // Esto soluciona la congelación nativa impuesta por Chrome en dispositivos Android.
          m[0] = 1 - 2 * (qy * qy + qz * qz);
          m[1] = 2 * (qx * qy + qz * qw);
          m[2] = 2 * (qx * qz - qy * qw);

          m[4] = 2 * (qx * qy - qz * qw);
          m[5] = 1 - 2 * (qx * qx + qz * qz);
          m[6] = 2 * (qy * qz + qx * qw);

          m[8] = 2 * (qx * qz + qy * qw);
          m[9] = 2 * (qy * qz - qx * qw);
          m[10] = 1 - 2 * (qx * qx + qy * qy);

          // Fijamos la posición de la cámara (X = 0, Altura de los ojos Y = 1.6m, Z = 0)
          m[12] = 0;
          m[13] = 1.6;
          m[14] = 0;
          m[15] = 1;
        }

        // Renderizamos usando la inyección directa del giroscopio sobre la API original
        scene.drawXRFrame(frame, pose);
      }

      scene.endFrame();
    }

    initXR();
  </script>
</body>
</html>
